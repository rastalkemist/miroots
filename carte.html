<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Roots — La carte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@500;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="roots-fonts.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25/build/css/intlTelInput.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/umd/lucide.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25/build/js/intlTelInput.min.js" defer></script>
<script src="roots.js"></script>
<style>
/* ==========================================================================
   ÉCRAN — La carte · mi.roots.bj/carte · v1 (23/07/2026)
   Évolution de l'Écran 2 « Encas & Rafraîchissements » → carte complète V12,
   construite comme MODULE réutilisable (roots.bj le recomposera — DRY, cf.
   Note_Architecture_SousDomaines_Roots).
   - Nav PARTAGÉE identique à retrouver.html : corps aligné sur le « M »,
     symbole en outdent dans la marge (--logo-decalage, repli max()).
   - COUCHE CONTEXTUELLE (décision Mika 23/07) :
        ?table=N  → mode « SUR PLACE » : commande taguée à la table N, service
                     à la table, pas de nom/tel requis.
        (sinon)    → mode « À EMPORTER » : nom + numéro, code de retrait.
     (Livraison = v1.1, hors périmètre ici.)
   - Paiement Kkiapay (stub prod : widget → Edge Function Supabase). Sans compte.
   - Données de menu = source provisoire ; à externaliser vers Supabase.
   ========================================================================== */
:root{
 --marge:5%; --site-w:90%; --col:500px;
 --roots-vert:#006838;--roots-jaune:#FFC840;--roots-terracotta:#CE5A2C;
 --roots-rouge:#CD0909;--roots-noir:#1A1A1A;
 --creme:#F8EDDA;--vert-nuit:#0A332E;--vert-foret:#2F4B3C;
 --blanc-casse:#FDFBF6;--carte-blanc:#FFFFFF;
 --gris-ilot:#E4E1DA;--gris-service:#E4E1DA;--vert-selection:rgba(0,104,56,.08);
 --encre:var(--vert-nuit);--encre-discrete:var(--vert-foret);
 --font-corps:'Museo Sans','Roboto',system-ui,sans-serif;
 --font-moderno:'MuseoModerno',var(--font-corps);
 --font-chiffres:'Museo Slab','Roboto Slab','Rockwell',serif;
 --r-pilule:999px;--r-carte:26px;--r-module:17px;--r-champ:13px;
 --safe-bas:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--blanc-casse);color:var(--encre);font-family:var(--font-corps);padding-bottom:calc(124px + var(--safe-bas));position:relative}
svg.lucide{width:1em;height:1em;vertical-align:-0.12em}

.corps{width:var(--site-w);max-width:var(--col);margin:0 auto;padding:16px 0 0}

/* ---------- Champ téléphone international (intl-tel-input) ---------- */
/* styles du CHAMP uniquement (scopés à .champ) : sinon ils touchent aussi le
   conteneur de la liste rattaché au <body> qui porte aussi la classe .iti. */
.champ .iti{width:100%;display:block;background:var(--gris-ilot);border:1.5px solid transparent;border-radius:var(--r-champ);height:48px}
.champ .iti:focus-within{border-color:var(--roots-vert);background:var(--carte-blanc)}
#telephone{width:100%;height:100%;background:transparent;border:none;color:var(--encre);font-family:var(--font-corps);font-size:16px;padding:0 13px}
#telephone:focus{outline:none}
.iti__country-container{display:flex;align-items:center;padding:0 4px}
.iti__selected-country{display:flex;align-items:center;height:100%;background:transparent}
.iti__selected-dial-code{font-family:var(--font-corps);color:var(--encre);font-weight:500;font-size:16px;padding:0 4px}
/* liste des pays (rattachée au <body>) : lisible partout, au-dessus de tout */
.iti--container,.iti--fullscreen-popup{z-index:10000}
.iti__dropdown-content{background:#fff;color:#1A1A1A}
.iti__country-name{color:#1A1A1A}
.iti__dial-code{color:#6b7b70}
.iti__country.iti__highlight{background:rgba(0,104,56,.10)}

/* ══════════════ CHROME PARTAGÉ (variante fond clair) ══════════════ */
.chrome-haut{position:sticky;top:0;z-index:20;background:rgba(253,251,246,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--gris-service);padding:11px 0}
.chrome-inner{width:var(--site-w);max-width:var(--col);margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.chrome-inner>.ankh-home{justify-self:start}
.chrome-inner>.centre{justify-self:center}
.chrome-inner>.chrome-droite{justify-self:end}
/* Pastille dépliée : l'ankh reste toujours en place (gauche) ; le reste
   (titre, langue, menu) s'efface vers la gauche « sous » la pastille, qui
   s'aligne à droite le temps du choix, puis tout revient au centre. */
.chrome-inner{transition:grid-template-columns .5s cubic-bezier(.22,.85,.3,1)}
.chrome-titre,.chrome-droite{transition:opacity .3s ease,transform .34s ease}
/* uniquement sur téléphone : place étroite → on efface le reste et la pastille
   s'aligne à droite. Sur tablette/laptop il y a la place, donc rien ne bouge. */
@media(max-width:639px){
 /* la pastille s'ouvre centrée et glisse à droite ; la colonne de gauche ne
    descend jamais sous ~58px : elle se fige à cette marge de l'ankh et
    l'étirement continue vers la droite. */
 .chrome-inner.deploie{grid-template-columns:minmax(58px,1fr) auto minmax(0,1fr)}
 .chrome-inner.deploie .centre{gap:0}
 .chrome-inner.deploie .chrome-titre,.chrome-inner.deploie .chrome-droite{opacity:0;pointer-events:none;transform:translateX(-12px);width:0;min-width:0;margin:0;overflow:hidden}
}
/* pas de filigrane bleuâtre au tap sur mobile */
.chrome-haut,.chrome-bas,.chrome-haut *,.chrome-bas *{-webkit-tap-highlight-color:transparent}
.toggle,.ankh-home,.chrome-burger,.lang-btn,.verbe{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
.centre{display:flex;align-items:center;gap:5px}
.ankh-home{display:flex;align-items:center;flex-shrink:0;text-decoration:none}
.ankh-home svg{width:44px;height:44px;display:block}
.toggle{position:relative;display:flex;align-items:center;height:42px;max-width:42px;overflow:hidden;cursor:pointer;
 background:var(--roots-vert);border:1.5px solid var(--roots-vert);border-radius:var(--r-pilule);box-shadow:0 3px 10px rgba(0,104,56,.30);
 transition:max-width .42s cubic-bezier(.2,.9,.25,1)}
.toggle.ouvert{max-width:300px;transition:max-width .62s cubic-bezier(.22,.85,.3,1)}
.toggle .mot{width:39px;height:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-moderno);font-weight:700;font-size:19px;color:var(--blanc-casse);line-height:1}
.toggle .reste{display:flex;align-items:center;gap:8px;padding-right:14px;flex-shrink:0}
.reste .sub{font-size:11px;color:rgba(253,251,246,.72);font-style:italic}
.switch{width:42px;height:22px;border-radius:var(--r-pilule);background:rgba(253,251,246,.20);border:1px solid rgba(253,251,246,.3);position:relative;cursor:pointer;flex-shrink:0}
.switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--blanc-casse);transition:left .2s ease}
.reste .nu{font-family:var(--font-moderno);font-weight:700;font-size:16px;color:var(--blanc-casse)}
.chrome-titre{font-family:var(--font-moderno);font-weight:700;font-size:21px;color:var(--roots-vert);letter-spacing:.01em}
.chrome-droite{display:flex;align-items:center;gap:8px}
.lang-btn{height:40px;padding:0 4px;border:none;background:none;color:var(--roots-vert);font-family:var(--font-corps);font-weight:700;font-size:14px;cursor:pointer}
.chrome-burger{width:38px;height:42px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--encre)}
.chrome-burger svg{width:30px;height:30px}
/* super-nav */
.chrome-bas{position:fixed;left:0;right:0;bottom:0;z-index:15;display:flex;min-height:64px;height:7vh;padding-bottom:var(--safe-bas);
 background:var(--blanc-casse);border-top:2px solid var(--roots-vert);box-shadow:0 -6px 24px rgba(5,25,18,.14)}
.verbe{flex:1;border:none;background:none;cursor:pointer;position:relative;color:var(--vert-foret);display:flex;align-items:center;justify-content:center}
.ico-rond{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ico-rond svg{width:44px;height:44px}
.verbe.actif .ico-rond{background:var(--roots-vert);color:var(--blanc-casse)}
.verbe.dormant{opacity:.55}
.verbe.dormant::after{content:'';position:absolute;top:9px;right:calc(50% - 28px);width:6px;height:6px;border-radius:50%;background:var(--roots-jaune)}
@media(min-width:640px){
 .chrome-bas{left:50%;right:auto;transform:translateX(-50%);bottom:calc(18px + var(--safe-bas));width:auto;min-height:0;height:auto;padding:6px;border:1.5px solid var(--roots-vert);border-radius:var(--r-pilule);box-shadow:0 12px 30px rgba(5,25,18,.28)}
 .verbe{flex:0 0 auto;padding:4px 6px}
 .ico-rond{width:56px;height:56px}
}
/* menu déroulant (haut-droite) */
.voile-menu{position:fixed;inset:0;z-index:24;background:rgba(5,20,14,.22);opacity:0;pointer-events:none;transition:opacity .25s ease}
.voile-menu.visible{opacity:1;pointer-events:auto}
.menu-pop{position:fixed;top:60px;right:5%;z-index:25;width:min(300px,86vw);max-height:calc(100vh - 84px);overflow-y:auto;scrollbar-width:none;
 background:var(--carte-blanc);color:var(--encre);border-radius:var(--r-carte);padding:6px 12px 12px;box-shadow:0 18px 44px rgba(5,25,18,.28);
 transform-origin:top right;transform:scale(.9) translateY(-8px);opacity:0;pointer-events:none;transition:transform .26s cubic-bezier(.2,.9,.25,1),opacity .2s ease}
.menu-pop::-webkit-scrollbar{display:none}
.menu-pop.visible{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}
.menu-pop .tete{display:flex;justify-content:flex-end;margin-bottom:2px}
.menu-pop .fermer{background:none;border:none;color:var(--encre-discrete);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
.lien-section{display:flex;align-items:center;gap:13px;text-decoration:none;color:var(--encre);padding:14px 8px;border-bottom:1px solid var(--gris-ilot);font-size:15px;font-weight:600;cursor:pointer}
.lien-section:last-child{border-bottom:none}
.lien-section .ico{width:38px;height:38px;flex-shrink:0;border-radius:12px;background:var(--vert-selection);color:var(--roots-vert);display:flex;align-items:center;justify-content:center}
.lien-section .ico svg{width:19px;height:19px}
.lien-section .txt{flex:1}
.lien-section .txt small{display:block;font-size:11.5px;font-weight:400;color:var(--encre-discrete);margin-top:1px}
/* toast */
.toast{position:fixed;left:50%;bottom:calc(88px + var(--safe-bas));transform:translateX(-50%) translateY(10px);z-index:30;background:rgba(10,51,46,.95);color:var(--creme);font-size:13px;font-weight:600;padding:11px 18px;border-radius:var(--r-pilule);box-shadow:0 8px 24px rgba(5,25,18,.4);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;max-width:80vw;text-align:center}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Hero ---------- */
.badge-table{display:inline-flex;align-items:center;gap:6px;background:var(--vert-selection);border:1.5px solid var(--roots-vert);color:var(--roots-vert);font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r-pilule);margin-bottom:10px}
.badge-table svg{width:14px;height:14px}
.badge-emporter{display:inline-flex;align-items:center;gap:6px;background:var(--gris-ilot);color:var(--encre-discrete);font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r-pilule);margin-bottom:10px}
.badge-emporter svg{width:14px;height:14px}
h1{font-size:24px;margin:0 0 6px;line-height:1.15}
.sous-titre{font-size:13px;color:var(--encre-discrete);margin:0 0 14px;line-height:1.5}

/* ---------- Onglets = ancres de saut ---------- */
.categories{position:sticky;top:63px;z-index:9;background:rgba(253,251,246,.96);backdrop-filter:blur(8px);
 display:flex;gap:8px;overflow-x:auto;padding:8px 0 10px;margin-bottom:6px;scrollbar-width:none}
.categories::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;background:var(--gris-ilot);border:2px solid transparent;border-radius:var(--r-pilule);
 padding:9px 15px;font-family:var(--font-corps);font-size:13px;font-weight:600;color:var(--encre);cursor:pointer;white-space:nowrap}
.cat.actif{background:var(--vert-selection);border-color:var(--roots-vert)}

.section-menu{scroll-margin-top:124px}
.section-menu h3{font-size:15px;font-weight:700;margin:20px 0 10px;padding-left:9px;border-left:3px solid var(--roots-vert);background:var(--blanc-casse);box-shadow:0 0 7px 7px var(--blanc-casse);display:table;border-radius:3px}
.section-menu:first-of-type h3{margin-top:6px}

.article{background:var(--carte-blanc);border-radius:var(--r-module);padding:14px 15px;margin-bottom:10px;
 display:flex;justify-content:space-between;gap:12px;align-items:center;box-shadow:0 2px 10px rgba(10,51,46,.05)}
.article .infos{flex:1}
.article .nom{font-size:14.5px;font-weight:700}
.article .desc{font-size:12.5px;color:var(--roots-terracotta);margin-top:3px;line-height:1.4;font-family:'Museo','Roboto Serif',Georgia,serif;font-weight:300}
.article .prix{font-size:13px;font-weight:600;color:var(--encre);margin-top:5px;font-family:var(--font-chiffres)}
.btn-plus{width:38px;height:38px;border-radius:50%;border:none;background:var(--roots-vert);
 color:var(--blanc-casse);font-size:18px;cursor:pointer;line-height:1;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.stepper{display:flex;align-items:center;gap:10px;background:var(--vert-selection);
 border:2px solid var(--roots-vert);border-radius:var(--r-pilule);padding:3px;flex-shrink:0}
.stepper button{width:30px;height:30px;border-radius:50%;border:none;background:var(--carte-blanc);
 color:var(--encre);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stepper span{font-weight:700;font-size:14px;min-width:16px;text-align:center}

/* ---------- Barre panier ---------- */
.barre-panier{position:fixed;z-index:16;bottom:calc(78px + var(--safe-bas));left:50%;transform:translateX(-50%);
 width:min(400px,calc(100% - 32px));background:var(--roots-vert);color:var(--blanc-casse);
 border:none;border-radius:var(--r-pilule);padding:16px 22px;font-family:var(--font-corps);
 font-weight:700;font-size:14.5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
 box-shadow:0 10px 30px rgba(10,51,46,.35);transition:opacity .25s ease,transform .25s ease}
.barre-panier.cachee{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(12px)}
.barre-panier .badge{background:var(--blanc-casse);color:var(--roots-vert);border-radius:var(--r-pilule);
 padding:2px 10px;font-size:12.5px;margin-right:8px}
@media(min-width:640px){.barre-panier{bottom:calc(98px + var(--safe-bas))}}

.voile{position:fixed;inset:0;z-index:40;background:rgba(5,20,14,.5);opacity:0;pointer-events:none;transition:opacity .25s ease}
.voile.visible{opacity:1;pointer-events:auto}
.panneau{position:fixed;z-index:41;left:50%;bottom:0;transform:translate(-50%,112%);
 width:min(450px,100%);max-height:90vh;overflow-y:auto;scrollbar-width:none;background:var(--carte-blanc);
 border-radius:var(--r-carte) var(--r-carte) 0 0;padding:20px 20px 28px;
 box-shadow:0 -12px 40px rgba(5,25,18,.35);transition:transform .34s cubic-bezier(.2,.9,.25,1)}
.panneau::-webkit-scrollbar{display:none}
.panneau.visible{transform:translate(-50%,0)}
@media(min-width:500px){.panneau{bottom:22px;border-radius:var(--r-carte)}}
.poignee{width:38px;height:4px;background:var(--gris-service);border-radius:4px;margin:0 auto 14px}
.entete-panneau{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.entete-panneau h2{font-size:20px;margin:0 0 3px}
.entete-panneau p{font-size:12.5px;color:var(--encre-discrete);margin:0}
.fermer{background:none;border:none;color:var(--encre-discrete);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
.ligne-panier{display:flex;justify-content:space-between;align-items:center;gap:10px;
 padding:10px 0;border-bottom:1px solid var(--gris-ilot);font-size:13.5px}
.ligne-panier .qte{color:var(--encre-discrete);font-size:12px}
.ligne-panier .montant{font-weight:600;color:var(--encre);white-space:nowrap;font-family:var(--font-chiffres)}
.total-ligne{display:flex;justify-content:space-between;padding:13px 0 16px;font-size:15px;font-weight:700}
.total-ligne .montant{color:var(--encre);font-size:18px;font-family:var(--font-chiffres)}
.champ{margin-bottom:13px}
.champ label{display:block;font-size:11px;color:var(--encre-discrete);margin-bottom:5px;font-weight:600}
.champ input{width:100%;background:var(--gris-ilot);border:1.5px solid transparent;border-radius:var(--r-champ);
 padding:12px 13px;color:var(--encre);font-family:var(--font-corps);font-size:14.5px}
.champ input:focus{outline:none;border-color:var(--roots-vert);background:var(--carte-blanc)}
.etiquette-paiement{display:block;font-size:11px;color:var(--encre-discrete);font-weight:600;margin-bottom:5px}
.paiements{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
.paiements .chip-p{background:var(--gris-ilot);border:2px solid transparent;border-radius:var(--r-pilule);
 padding:9px 14px;font-family:var(--font-corps);font-size:12.5px;font-weight:600;color:var(--encre);cursor:pointer}
.paiements .chip-p.actif{background:var(--vert-selection);border-color:var(--roots-vert)}
.bouton-confirmer{width:100%;background:var(--roots-vert);color:var(--blanc-casse);border:none;
 border-radius:var(--r-pilule);padding:16px;font-family:var(--font-corps);font-weight:700;font-size:15px;cursor:pointer}
.mention{text-align:center;font-size:11.5px;color:var(--encre-discrete);margin-top:10px}

.ecran-confirmation{display:none;text-align:center;padding:18px 6px 6px}
.ecran-confirmation.visible{display:block}
.ecran-confirmation .soleil-ok{height:46px;margin:0 auto 10px;display:flex;justify-content:center}
.ecran-confirmation .soleil-ok svg{height:100%;width:auto}
.code{font-family:var(--font-chiffres);font-weight:700;font-size:33px;letter-spacing:.13em;color:var(--roots-vert);margin:8px 0}
.instructions{font-size:13px;color:var(--encre-discrete);line-height:1.55;max-width:300px;margin:0 auto}
</style>
</head>
<body>

<header class="chrome-haut">
  <div class="chrome-inner">
    <a class="ankh-home" href="index.html" aria-label="Accueil"><svg xmlns="http://www.w3.org/2000/svg" width="110" height="111" viewBox="0 0 110 111">

    <div class="centre">
      <div class="toggle" id="marque">
        <span class="mot" id="motMode">Mi</span>

          <span class="sub">(social)</span>

      <button class="lang-btn" id="btnLangue" aria-label="Langue">EN</button>
      <button class="chrome-burger" id="btnBurger" aria-label="Menu"><i data-lucide="menu">≡</i></button>
    </div>

  <div class="ecran-confirmation" id="ecranConfirmation">

    <p style="margin:0;font-size:14.5px;font-weight:700;" id="confTitre"></p>
    <div class="code" id="codeAffiche">------</div>
    <p class="instructions" id="confInstr"></p>
  </div>
</div>

<!-- ══════════════ CHROME : super-nav + menu déroulant + toast ══════════════ -->
<nav class="chrome-bas" id="superNav">
  <button class="verbe dormant" data-verbe="roam" aria-label="Roam"><span class="ico-rond"><i data-lucide="compass">✳</i></span></button>
  <button class="verbe actif" data-verbe="roots" aria-label="Roots"><span class="ico-rond"><i data-lucide="sprout">❦</i></span></button>
  <button class="verbe dormant" data-verbe="road" aria-label="Road"><span class="ico-rond"><i data-lucide="route">↝</i></span></button>
</nav>
<div class="voile-menu" id="voileMenu"></div>
<div class="menu-pop" id="drawer">
  <div class="tete"><button class="fermer" id="fermerMenu" aria-label="Fermer"><i data-lucide="x">×</i></button></div>
  <div id="sections"></div>
</div>
<div class="toast" id="toast"></div>

<script src="menu-data.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════════════
   MENU — carte V12 complète. ZONE ÉDITABLE (rédacteurs / traducteurs).
   { id:'...', nom:{fr,en}, desc:{fr,en} (optionnel), prix:0 }
   Termes du terroir (ayimolou, wangashi, maca, soto…) : gardés tels quels.
   NB : source provisoire → sera externalisée vers Supabase.
   ══════════════════════════════════════════════════════════════════════════ */
/* MENU depuis menu-data.js (source unique) */

const TEXTES={
 fr:{titre:'La carte',voirCommande:'Voir ma commande',maCommande:'Ma commande',total:'Total',
  tonNom:"Ton nom (pour t'appeler)",tonTel:'Ton numéro',etPaiement:'Paiement',
  mentionPaiement:'Paiement sécurisé via Kkiapay.',payer:'Payer',commander:'Commander',
  momo:'MTN MoMo',moov:'Moov Money',carte:'Carte bancaire',cashComptoir:'Au comptoir',cashTable:'À la table',
  sousEmporter:"Commande sans compte — on t'appelle quand c'est prêt.",
  sousSurplace:n=>`Table ${n} · on t'apporte ça directement.`,
  badgeEmporter:'À emporter',badgeTable:n=>`Table ${n}`,
  sousPanneauEmporter:'Vérifie, puis passe commande.',
  sousPanneauSurplace:n=>`Service à la table ${n}.`,
  confTitreEmporter:"C'est commandé. La cuisine s'y met.",
  confTitreSurplace:"C'est noté. On s'occupe de toi.",
  confInstrEmporter:"Donne ce code au comptoir. On t'appelle par ton prénom quand c'est prêt.",
  confInstrSurplace:n=>`Ta commande arrive à la table ${n}. Ce code, c'est ton reçu.`,
  champsRequis:"Ton prénom et un numéro valide, et c'est parti !"},
 en:{titre:'Menu',voirCommande:'View my order',maCommande:'My order',total:'Total',
  tonNom:'Your name (so we can call you)',tonTel:'Your number',etPaiement:'Payment',
  mentionPaiement:'Secure payment via Kkiapay.',payer:'Pay',commander:'Place order',
  momo:'MTN MoMo',moov:'Moov Money',carte:'Bank card',cashComptoir:'At the counter',cashTable:'At the table',
  sousEmporter:"Order without an account — we'll call you when it's ready.",
  sousSurplace:n=>`Table ${n} · we'll bring it right to you.`,
  badgeEmporter:'Takeaway',badgeTable:n=>`Table ${n}`,
  sousPanneauEmporter:'Check it, then place your order.',
  sousPanneauSurplace:n=>`Table service at table ${n}.`,
  confTitreEmporter:'Order placed. The kitchen is on it.',
  confTitreSurplace:"Got it. We're taking care of you.",
  confInstrEmporter:"Give this code at the counter. We'll call your name when it's ready.",
  confInstrSurplace:n=>`Your order is on its way to table ${n}. This code is your receipt.`,
  champsRequis:'Your first name and a valid number, and off we go!'}
};

/* ---------- Contexte (décision Mika 23/07 : QR à table = sur place) ---------- */
const params=new URLSearchParams(location.search);
const tableParam=params.get('table');
const numeroTable=tableParam?tableParam.replace(/[^0-9A-Za-z]/g,'').slice(0,4):null;
const modeService=numeroTable?'surplace':'emporter';

let langue='fr',moyenPaiement=modeService==='surplace'?'cash':'momo';
const panier={};

function majIcones(){if(window.lucide)lucide.createIcons();}
function fmt(n){return n.toLocaleString(langue==='fr'?'fr-FR':'en-US');}
function trouverArticle(id){for(const c of MENU){const a=c.articles.find(x=>x.id===id);if(a)return a;}return null;}

/* ---------- Chrome partagé (roots.js) : toggle Mi/NU, super-nav, menu, toast ---------- */
const CHROME_SECTIONS={
 fr:[{ico:'calendar-check',t:'Réserver un espace',s:"Depuis l'accueil",href:'index.html'},
     {ico:'search',t:'Retrouver ma réservation',s:'Avec ton code',href:'retrouver.html'}],
 en:[{ico:'calendar-check',t:'Book a space',s:'From the home',href:'index.html'},
     {ico:'search',t:'Find my booking',s:'With your code',href:'retrouver.html'}]
};
const CHROME_T={
 fr:{toastVerbe:v=>`${v} arrive bientôt.`,toastNu:'Le mode NU (communauté) arrive bientôt.'},
 en:{toastVerbe:v=>`${v} coming soon.`,toastNu:'NU mode (community) coming soon.'}
};
const VERBES={roots:'Roots',road:'Road',roam:'Roam'};
const chromeUI=Roots.initChrome({
 getLangue:()=>langue,
 getSections:l=>CHROME_SECTIONS[l],
 toastNu:l=>CHROME_T[l].toastNu,
 toastVerbe:(l,label)=>CHROME_T[l].toastVerbe(label),
 verbes:VERBES
});

/* ---------- Contexte + langue appliqués au DOM ---------- */
function appliquerContexte(){
 const t=TEXTES[langue];
 const badge=document.getElementById('badgeContexte');
 if(modeService==='surplace'){
  badge.innerHTML=`<span class="badge-table"><i data-lucide="map-pin">•</i>${t.badgeTable(numeroTable)}</span>`;
  document.getElementById('sousTitre').textContent=t.sousSurplace(numeroTable);
  document.getElementById('sousPanneau').textContent=t.sousPanneauSurplace(numeroTable);
  document.getElementById('champsEmporter').style.display='none';
 }else{
  badge.innerHTML=`<span class="badge-emporter"><i data-lucide="shopping-bag">•</i>${t.badgeEmporter}</span>`;
  document.getElementById('sousTitre').textContent=t.sousEmporter;
  document.getElementById('sousPanneau').textContent=t.sousPanneauEmporter;
  document.getElementById('champsEmporter').style.display='block';
 }
}
function appliquerLangue(){
 const t=TEXTES[langue];
 document.querySelectorAll('[data-t]').forEach(el=>{const v=t[el.dataset.t];if(typeof v==='string')el.textContent=v;});
 document.documentElement.lang=langue;
 appliquerContexte();dessinerCategories();dessinerMenu();majPanier();chromeUI.dessinerSections();
}
document.getElementById('btnLangue').addEventListener('click',()=>{
 langue=langue==='fr'?'en':'fr';
 document.getElementById('btnLangue').textContent=langue==='fr'?'EN':'FR';
 appliquerLangue();majIcones();
});

/* ---------- Onglets = ancres ---------- */
function dessinerCategories(){
 const c=document.getElementById('categories');
 c.innerHTML=MENU.map(cat=>`<button class="cat" data-cat="${cat.id}">${cat.t[langue]}</button>`).join('');
 c.querySelectorAll('.cat').forEach(btn=>btn.addEventListener('click',()=>{
  activerOnglet(btn.dataset.cat);
  document.getElementById('sec-'+btn.dataset.cat).scrollIntoView({behavior:'smooth'});}));
}
function dessinerMenu(){
 document.getElementById('listeMenu').innerHTML=MENU.map(cat=>`
  <section class="section-menu" id="sec-${cat.id}">
   <h3>${cat.t[langue]}</h3>
   ${cat.articles.map(a=>{
    const q=panier[a.id]||0;
    return `<div class="article">
     <div class="infos">
      <div class="nom">${a.nom[langue]}</div>
      ${a.desc?`<div class="desc">${a.desc[langue]}</div>`:''}
      <div class="prix">${fmt(a.prix)} FCFA</div>
     </div>
     ${q===0
      ?`<button class="btn-plus" data-plus="${a.id}" aria-label="Ajouter"><i data-lucide="plus">+</i></button>`
      :`<div class="stepper"><button data-moins="${a.id}" aria-label="Retirer"><i data-lucide="minus">−</i></button><span>${q}</span><button data-plus="${a.id}" aria-label="Ajouter"><i data-lucide="plus">+</i></button></div>`}
    </div>`;}).join('')}
  </section>`).join('');
 document.querySelectorAll('[data-plus]').forEach(b=>b.addEventListener('click',()=>{
  panier[b.dataset.plus]=(panier[b.dataset.plus]||0)+1;dessinerMenu();majPanier();}));
 document.querySelectorAll('[data-moins]').forEach(b=>b.addEventListener('click',()=>{
  const id=b.dataset.moins;panier[id]=Math.max(0,(panier[id]||0)-1);
  if(panier[id]===0)delete panier[id];
  dessinerMenu();majPanier();}));
 majOngletActif();majIcones();
}
function activerOnglet(id){
 document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('actif',b.dataset.cat===id));
}
function majOngletActif(){
 const ligne=122;let courant=MENU[0].id;
 document.querySelectorAll('.section-menu').forEach(s=>{
  if(s.getBoundingClientRect().top<=ligne)courant=s.id.slice(4);});
 activerOnglet(courant);
}
let defilementPrevu=false;
window.addEventListener('scroll',()=>{
 if(defilementPrevu)return;defilementPrevu=true;
 requestAnimationFrame(()=>{majOngletActif();defilementPrevu=false;});
},{passive:true});

/* ---------- Panier ---------- */
function totalPanier(){return Object.entries(panier).reduce((s,[id,q])=>s+trouverArticle(id).prix*q,0);}
function qtePanier(){return Object.values(panier).reduce((s,q)=>s+q,0);}
function majPanier(){
 const qte=qtePanier();
 document.getElementById('barrePanier').classList.toggle('cachee',qte===0);
 document.getElementById('badgeQte').textContent=qte;
 document.getElementById('barreTotal').textContent=fmt(totalPanier())+' FCFA';
}

const panneau=document.getElementById('panneau'),voile=document.getElementById('voile');
function ouvrir(){
 document.getElementById('lignesPanier').innerHTML=Object.entries(panier).map(([id,q])=>{
  const a=trouverArticle(id);
  return `<div class="ligne-panier"><span>${a.nom[langue]} <span class="qte">× ${q}</span></span>
   <span class="montant">${fmt(a.prix*q)} FCFA</span></div>`;}).join('');
 document.getElementById('panneauTotal').textContent=fmt(totalPanier())+' FCFA';
 dessinerPaiements();
 panneau.classList.add('visible');voile.classList.add('visible');majIcones();
}
function fermer(){panneau.classList.remove('visible');voile.classList.remove('visible');}
document.getElementById('barrePanier').addEventListener('click',ouvrir);
document.getElementById('btnFermer').addEventListener('click',fermer);
voile.addEventListener('click',fermer);

/* ---------- Paiement ---------- */
function moyensDispo(){
 const t=TEXTES[langue];
 return {momo:t.momo,moov:t.moov,carte:t.carte,
  cash:modeService==='surplace'?t.cashTable:t.cashComptoir};
}
function dessinerPaiements(){
 const c=document.getElementById('paiements'),moyens=moyensDispo();
 if(!moyens[moyenPaiement])moyenPaiement='momo';
 c.innerHTML=Object.entries(moyens).map(([id,nom])=>
  `<button class="chip-p ${id===moyenPaiement?'actif':''}" data-moyen="${id}">${nom}</button>`).join('');
 c.querySelectorAll('.chip-p').forEach(b=>b.addEventListener('click',()=>{
  moyenPaiement=b.dataset.moyen;dessinerPaiements();}));
 majBoutonCommander();
}
function majBoutonCommander(){
 const t=TEXTES[langue];
 document.getElementById('btnCommander').textContent=
  moyenPaiement==='cash'?t.commander:`${t.payer} ${fmt(totalPanier())} FCFA`;
}

function genererCode(){
 const car='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
 return Array.from({length:6},()=>car[Math.floor(Math.random()*car.length)]).join('');
}

document.getElementById('btnCommander').addEventListener('click',()=>{
 const t=TEXTES[langue];
 let nom=null,tel=null;
 if(modeService==='emporter'){
  nom=document.getElementById('nom').value.trim();
  tel=document.getElementById('telephone').value.trim();
  if(nom.length<2||tel.length<8){alert(t.champsRequis);return;}
 }
 const code=genererCode();

 /* Charge utile — préfigure le modèle de données Supabase (table `commandes`).
    Production : moyen digital → widget Kkiapay (momo/moov/carte) → webhook
    Kkiapay → Edge Function Supabase → statut 'payee' + reference_paiement.
    'cash' (au comptoir / à la table) → insert direct, statut 'en_attente'.
    Puis notification à l'équipe cuisine (avec le n° de table si sur place). */
 const commande={
  code,
  mode:modeService,                 // 'surplace' | 'emporter'
  table:numeroTable,                // n° de table (sur place) sinon null
  articles:Object.entries(panier).map(([id,q])=>({id,qte:q,prix:trouverArticle(id).prix})),
  total:totalPanier(),
  moyen_paiement:moyenPaiement,
  statut:moyenPaiement==='cash'?'en_attente':'a_payer',
  client:{nom,tel},
  langue
 };
 console.log('[commande] à envoyer vers Supabase :',commande);

 document.getElementById('vueCommande').style.display='none';
 document.getElementById('codeAffiche').textContent=code;
 document.getElementById('confTitre').textContent=
  modeService==='surplace'?t.confTitreSurplace:t.confTitreEmporter;
 document.getElementById('confInstr').textContent=
  modeService==='surplace'?t.confInstrSurplace(numeroTable):t.confInstrEmporter;
 document.getElementById('ecranConfirmation').classList.add('visible');
});

/* ---------- Init ---------- */
appliquerLangue();majPanier();
window.addEventListener('DOMContentLoaded',majIcones);
window.addEventListener('load',()=>{
 majIcones();
 if(modeService==='emporter') Roots.initTelRoots(document.getElementById('telephone'));
});
</script>
</body>
</html>
