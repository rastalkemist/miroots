<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mi Roots — Le jardin, où que tu sois</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@500;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="roots-fonts.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.454.0/umd/lucide.min.js" defer></script>
<style>
/* ==========================================================================
   PORTE D'ENTRÉE — mi.roots.bj (Jardin) · v1 (23/07/2026)
   Le CHROME de nav = la grille 2×3 (décision Mika 23/07) :
     · barre du BAS = super-nav des trois verbes (Roots / Road / Roam)
     · HAUT-GAUCHE = ankh_roots + toggle Mi ↔ NU (axe mode)
     · HAUT-CENTRE = nom de l'expérience (MuseoModerno) — « tu es ici »
     · HAUT-DROITE = menu hamburger → sections de l'expérience courante
   v1 : Roots VIVANT, Road/Roam DORMANTS ; Mi ACTIF, NU DORMANT.
   → Ce chrome (styles .chrome-*, .drawer, .toast + son JS) est PARTAGÉ :
     à recopier tel quel dans carte.html / retrouver.html ensuite.
   ========================================================================== */
:root{
 --roots-vert:#006838;--roots-jaune:#FFC840;--roots-terracotta:#CE5A2C;
 --roots-rouge:#CD0909;--roots-noir:#1A1A1A;
 --creme:#F8EDDA;--vert-nuit:#0A332E;--vert-foret:#2F4B3C;
 --blanc-casse:#FDFBF6;--carte-blanc:#FFFFFF;
 --gris-ilot:#E4E1DA;--gris-service:#E4E1DA;--vert-selection:rgba(0,104,56,.08);
 --encre:var(--vert-nuit);--encre-discrete:var(--vert-foret);
 --font-corps:'Museo Sans','Roboto',system-ui,sans-serif;
 --font-moderno:'MuseoModerno',var(--font-corps);
 --font-chiffres:'Museo Slab','Roboto Slab','Rockwell',serif;
 --r-pilule:999px;--r-carte:26px;--r-module:17px;--r-champ:13px;
 --safe-bas:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:var(--font-corps);color:var(--blanc-casse);overflow-x:hidden}
svg.lucide{width:1em;height:1em;vertical-align:-0.12em}

/* ---------- Fond jardin (placeholder vidéo, repris de l'accueil v5) ---------- */
.video-fond{position:fixed;inset:0;z-index:0;overflow:hidden;
 background:linear-gradient(160deg,#35703f,#006838 45%,#174f28 80%,#0A332E)}
.video-fond .halo{position:absolute;width:70vmax;height:70vmax;top:-18vmax;left:-12vmax;border-radius:50%;
 background:radial-gradient(circle,rgba(255,200,64,.42),transparent 62%);animation:respirer 9s ease-in-out infinite}
@keyframes respirer{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.12);opacity:1}}
.video-fond .feuille{position:absolute;border-radius:0 55% 0 55%;background:rgba(10,51,46,.5);
 animation:bercer 12s ease-in-out infinite;transform-origin:bottom center}
@keyframes bercer{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}
.voile-lisibilite{position:fixed;inset:0;z-index:1;pointer-events:none;
 background:linear-gradient(180deg,rgba(10,40,25,.42),transparent 32%,transparent 55%,rgba(6,26,16,.62))}

/* ══════════════ CHROME PARTAGÉ — barre du haut ══════════════ */
.chrome-haut{position:fixed;top:0;left:0;right:0;z-index:6;display:grid;
 grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:12px 14px}
.chrome-toggle{justify-self:start;display:flex;align-items:center;gap:8px;
 background:rgba(253,251,246,.15);border:1.5px solid rgba(253,251,246,.32);backdrop-filter:blur(6px);
 border-radius:var(--r-pilule);padding:5px 6px 5px 8px}
.chrome-toggle .ankh{width:24px;height:24px;display:flex;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))}
.chrome-toggle .ankh svg{width:24px;height:24px;display:block}
.seg{display:flex;background:rgba(6,26,16,.28);border-radius:var(--r-pilule);padding:2px}
.seg button{border:none;background:none;cursor:pointer;font-family:var(--font-moderno);font-weight:700;
 font-size:13px;line-height:1;padding:5px 9px;border-radius:var(--r-pilule);color:rgba(253,251,246,.6)}
.seg button.actif{background:var(--roots-jaune);color:var(--roots-noir)}
.chrome-titre{justify-self:center;font-family:var(--font-moderno);font-weight:700;font-size:22px;
 color:var(--blanc-casse);text-shadow:0 1px 6px rgba(0,0,0,.4);letter-spacing:.01em}
.chrome-burger{justify-self:end;width:42px;height:42px;border-radius:50%;
 border:1.5px solid rgba(253,251,246,.32);background:rgba(253,251,246,.15);backdrop-filter:blur(6px);
 display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blanc-casse)}
.chrome-burger svg{width:20px;height:20px}

/* ══════════════ CHROME PARTAGÉ — super-nav du bas (3 verbes) ══════════════ */
.chrome-bas{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(16px + var(--safe-bas));z-index:6;
 display:flex;gap:4px;background:rgba(253,251,246,.94);border-radius:var(--r-pilule);
 padding:6px;box-shadow:0 12px 34px rgba(5,25,18,.4)}
.verbe{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;
 padding:8px 18px;border-radius:var(--r-pilule);color:var(--vert-foret);font-family:var(--font-moderno);
 font-weight:700;font-size:11.5px;position:relative}
.verbe svg{width:21px;height:21px}
.verbe.actif{background:var(--roots-vert);color:var(--blanc-casse)}
.verbe.dormant{opacity:.45}
.verbe.dormant::after{content:'';position:absolute;top:6px;right:12px;width:5px;height:5px;border-radius:50%;background:var(--roots-jaune)}

/* ---------- Contenu Jardin ---------- */
main{position:relative;z-index:3;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;
 width:90%;max-width:500px;margin:0 auto;padding:96px 0 132px}
.hero h1{font-family:var(--font-moderno);font-weight:700;font-size:33px;line-height:1.1;margin:0 0 10px;
 text-shadow:0 2px 12px rgba(0,0,0,.4)}
.hero p{font-size:14.5px;line-height:1.5;margin:0 0 22px;color:rgba(253,251,246,.92);text-shadow:0 1px 8px rgba(0,0,0,.4);max-width:420px}
.actions{display:flex;flex-direction:column;gap:11px}
.btn-primaire{display:flex;align-items:center;justify-content:center;gap:9px;background:var(--blanc-casse);color:var(--vert-nuit);
 text-decoration:none;border-radius:var(--r-pilule);padding:16px;font-family:var(--font-corps);font-weight:700;font-size:15px;
 box-shadow:0 10px 30px rgba(5,25,18,.32)}
.btn-secondaire{display:flex;align-items:center;justify-content:center;gap:9px;background:rgba(253,251,246,.14);color:var(--blanc-casse);
 text-decoration:none;border:1.5px solid rgba(253,251,246,.4);backdrop-filter:blur(6px);
 border-radius:var(--r-pilule);padding:15px;font-family:var(--font-corps);font-weight:700;font-size:14.5px}
.btn-primaire svg,.btn-secondaire svg{width:18px;height:18px}

/* ══════════════ CHROME PARTAGÉ — menu de l'expérience (bottom sheet) ══════════════ */
.voile{position:fixed;inset:0;z-index:14;background:rgba(5,20,14,.5);opacity:0;pointer-events:none;transition:opacity .25s ease}
.voile.visible{opacity:1;pointer-events:auto}
.drawer{position:fixed;z-index:15;left:50%;bottom:0;transform:translate(-50%,112%);
 width:min(450px,100%);max-height:88vh;overflow-y:auto;scrollbar-width:none;background:var(--blanc-casse);color:var(--encre);
 border-radius:var(--r-carte) var(--r-carte) 0 0;padding:18px 18px calc(24px + var(--safe-bas));
 box-shadow:0 -12px 40px rgba(5,25,18,.35);transition:transform .34s cubic-bezier(.2,.9,.25,1)}
.drawer::-webkit-scrollbar{display:none}
.drawer.visible{transform:translate(-50%,0)}
@media(min-width:500px){.drawer{bottom:22px;border-radius:var(--r-carte)}}
.poignee{width:38px;height:4px;background:var(--gris-service);border-radius:4px;margin:0 auto 14px}
.drawer-tete{display:flex;align-items:center;justify-content:space-between;margin:0 4px 6px}
.drawer-tete .ou{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--encre-discrete)}
.drawer-tete .fermer{background:none;border:none;color:var(--encre-discrete);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
.lien-section{display:flex;align-items:center;gap:13px;text-decoration:none;color:var(--encre);
 padding:14px 8px;border-bottom:1px solid var(--gris-ilot);font-size:15px;font-weight:600;cursor:pointer}
.lien-section .ico{width:38px;height:38px;flex-shrink:0;border-radius:12px;background:var(--vert-selection);color:var(--roots-vert);
 display:flex;align-items:center;justify-content:center}
.lien-section .ico svg{width:19px;height:19px}
.lien-section .txt{flex:1}
.lien-section .txt small{display:block;font-size:11.5px;font-weight:400;color:var(--encre-discrete);margin-top:1px}
.lien-section.dormant{opacity:.55}
.lien-section .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--roots-terracotta)}
.drawer-pied{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:0 6px}
.mini-btn{display:flex;align-items:center;gap:7px;background:var(--gris-ilot);border:none;border-radius:var(--r-pilule);
 padding:9px 14px;font-family:var(--font-corps);font-weight:700;font-size:13px;color:var(--encre);cursor:pointer}
.mini-btn.actif{background:var(--roots-vert);color:var(--blanc-casse)}
.mini-btn svg{width:15px;height:15px}

/* ---------- Toast (états dormants) ---------- */
.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-bas));transform:translateX(-50%) translateY(10px);z-index:20;
 background:rgba(10,51,46,.94);color:var(--creme);font-size:13px;font-weight:600;padding:11px 18px;border-radius:var(--r-pilule);
 box-shadow:0 8px 24px rgba(5,25,18,.4);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="video-fond" aria-hidden="true">
  <div class="halo"></div>
  <div class="feuille" style="width:38vmax;height:52vmax;right:-14vmax;top:-8vmax;"></div>
  <div class="feuille" style="width:30vmax;height:44vmax;left:-10vmax;bottom:-16vmax;animation-delay:3s;"></div>
  <div class="feuille" style="width:20vmax;height:30vmax;right:8vmax;bottom:-10vmax;animation-delay:6s;opacity:.7;"></div>
</div>
<div class="voile-lisibilite"></div>

<!-- ══════════════ CHROME HAUT ══════════════ -->
<header class="chrome-haut">
  <div class="chrome-toggle">
    <span class="ankh"><svg xmlns="http://www.w3.org/2000/svg" width="110" height="111" viewBox="0 0 110 111">
<path fill-rule="nonzero" fill="rgb(10.196078%, 10.196078%, 10.196078%)" d="M 55.144531 3.101562 C 83.609375 3.101562 106.679688 26.175781 106.679688 54.636719 C 106.679688 83.101562 83.609375 106.171875 55.144531 106.171875 C 26.683594 106.171875 3.609375 83.101562 3.609375 54.636719 C 3.609375 26.175781 26.683594 3.101562 55.144531 3.101562 "/>
<path fill-rule="nonzero" fill="rgb(100%, 78.431373%, 25.098039%)" d="M 47.660156 45.566406 L 12.074219 42.925781 C 14.8125 33.019531 20.882812 24.355469 29.257812 18.398438 C 30.832031 21.53125 32.574219 24.574219 34.480469 27.515625 Z M 47.660156 45.566406 "/>
<path fill-rule="nonzero" fill="rgb(0%, 40.784314%, 21.960784%)" d="M 10.546875 57.304688 L 50.652344 54.070312 L 49.699219 99.140625 C 28.414062 96.554688 11.738281 78.992188 10.546875 57.304688 "/>
<path fill-rule="nonzero" fill="rgb(80.392157%, 3.529412%, 3.529412%)" d="M 67.039062 25.71875 C 65.503906 27.898438 57.183594 38.679688 54.992188 38.496094 C 47.457031 32.53125 40.75 23.539062 36.359375 14.269531 C 48.25 8.769531 61.953125 8.753906 73.855469 14.226562 C 71.894531 18.230469 69.613281 22.078125 67.039062 25.71875 "/>
<path fill-rule="nonzero" fill="rgb(100%, 78.431373%, 25.098039%)" d="M 62.132812 45.5625 C 68.492188 37.964844 75.789062 28.535156 80.960938 18.355469 C 89.371094 24.316406 95.464844 32.996094 98.207031 42.933594 Z M 62.132812 45.5625 "/>
<path fill-rule="nonzero" fill="rgb(0%, 40.784314%, 21.960784%)" d="M 99.742188 57.304688 C 98.554688 78.992188 81.878906 96.550781 60.59375 99.140625 L 59.640625 54.070312 Z M 99.742188 57.304688 "/>
</svg></span>
    <div class="seg" id="toggleMode">
      <button class="actif" data-mode="mi">Mi</button>
      <button data-mode="nu">NU</button>
    </div>
  </div>
  <div class="chrome-titre" id="titreExp">Roots</div>
  <button class="chrome-burger" id="btnBurger" aria-label="Menu"><i data-lucide="menu">≡</i></button>
</header>

<!-- ══════════════ CONTENU JARDIN ══════════════ -->
<main>
  <div class="hero">
    <h1 data-t="titre">Le jardin,<br>où que tu sois.</h1>
    <p data-t="sous">Réserve ta place, commande, retrouve ta résa — sans compte. Et emporte le Roots partout avec toi.</p>
    <div class="actions">
      <a class="btn-primaire" href="mi-roots-v5.html"><i data-lucide="calendar-check">▸</i><span data-t="reserver">Réserver un espace</span></a>
      <a class="btn-secondaire" href="carte.html"><i data-lucide="utensils">▸</i><span data-t="carte">Voir la carte</span></a>
    </div>
  </div>
</main>

<!-- ══════════════ CHROME BAS — super-nav 3 verbes ══════════════ -->
<nav class="chrome-bas" id="superNav">
  <button class="verbe actif" data-verbe="roots"><i data-lucide="sprout">❦</i><span>Roots</span></button>
  <button class="verbe dormant" data-verbe="road"><i data-lucide="route">↝</i><span>Road</span></button>
  <button class="verbe dormant" data-verbe="roam"><i data-lucide="compass">✳</i><span>Roam</span></button>
</nav>

<!-- ══════════════ CHROME — menu de l'expérience ══════════════ -->
<div class="voile" id="voile"></div>
<div class="drawer" id="drawer">
  <div class="poignee"></div>
  <div class="drawer-tete">
    <span class="ou" id="drawerOu">Mi · Roots</span>
    <button class="fermer" id="btnFermerDrawer" aria-label="Fermer"><i data-lucide="x">×</i></button>
  </div>
  <div id="sections"></div>
  <div class="drawer-pied">
    <button class="mini-btn" id="btnRadio"><i data-lucide="radio">◉</i><span data-t="radio">Roots Radio</span></button>
    <button class="mini-btn" id="btnLangue">EN</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TEXTES={
 fr:{titre:'Le jardin,<br>où que tu sois.',
  sous:'Réserve ta place, commande, retrouve ta résa — sans compte. Et emporte le Roots partout avec toi.',
  reserver:'Réserver un espace',carte:'Voir la carte',radio:'Roots Radio',
  sections:[
   {ico:'calendar-check',t:'Réserver un espace',s:'Jardin, bureau partagé ou privé',href:'mi-roots-v5.html'},
   {ico:'utensils',t:'La carte',s:'Commander au Roots ou à emporter',href:'carte.html'},
   {ico:'ticket',t:'Ma réservation',s:'Retrouver avec ton code',href:'retrouver.html'},
   {ico:'user-round',t:'Mon Espace',s:'Ton espace Mi Road',dormant:true,tag:'Bientôt'}
  ],
  toastVerbe:v=>`${v} arrive bientôt.`,toastNu:'Le mode NU (communauté) arrive bientôt.',
  toastEspace:'Ton Espace Mi Road arrive bientôt.'},
 en:{titre:'The garden,<br>wherever you are.',
  sous:'Book your spot, order, find your booking — no account. And take Roots with you everywhere.',
  reserver:'Book a space',carte:'See the menu',radio:'Roots Radio',
  sections:[
   {ico:'calendar-check',t:'Book a space',s:'Garden, shared or private desk',href:'mi-roots-v5.html'},
   {ico:'utensils',t:'The menu',s:'Order at Roots or takeaway',href:'carte.html'},
   {ico:'ticket',t:'My booking',s:'Find it with your code',href:'retrouver.html'},
   {ico:'user-round',t:'My Space',s:'Your Mi Road space',dormant:true,tag:'Soon'}
  ],
  toastVerbe:v=>`${v} coming soon.`,toastNu:'NU mode (community) coming soon.',
  toastEspace:'Your Mi Road space is coming soon.'}
};
let langue='fr';
const VERBES={roots:'Roots',road:'Road',roam:'Roam'};

function majIcones(){if(window.lucide)lucide.createIcons();}

function dessinerSections(){
 const t=TEXTES[langue];
 document.getElementById('sections').innerHTML=t.sections.map((s,i)=>{
  const inner=`<span class="ico"><i data-lucide="${s.ico}">•</i></span>
   <span class="txt">${s.t}<small>${s.s}</small></span>
   ${s.dormant?`<span class="tag">${s.tag}</span>`:'<i data-lucide="chevron-right">›</i>'}`;
  return s.dormant
   ? `<div class="lien-section dormant" data-dormant="espace">${inner}</div>`
   : `<a class="lien-section" href="${s.href}">${inner}</a>`;
 }).join('');
 document.querySelectorAll('[data-dormant="espace"]').forEach(el=>el.addEventListener('click',()=>{
  fermerDrawer();toast(TEXTES[langue].toastEspace);}));
 majIcones();
}
function appliquerLangue(){
 const t=TEXTES[langue];
 document.querySelectorAll('[data-t]').forEach(el=>{const v=t[el.dataset.t];if(typeof v==='string'){el.innerHTML=v;}});
 document.documentElement.lang=langue;
 document.getElementById('btnLangue').textContent=langue==='fr'?'EN':'FR';
 dessinerSections();majIcones();
}

/* ---------- Toast ---------- */
let toastTimer=null;
function toast(msg){
 const el=document.getElementById('toast');el.textContent=msg;el.classList.add('visible');
 clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('visible'),2600);
}

/* ---------- Toggle Mi / NU (NU dormant en v1) ---------- */
document.getElementById('toggleMode').addEventListener('click',e=>{
 const b=e.target.closest('button');if(!b)return;
 if(b.dataset.mode==='nu'){toast(TEXTES[langue].toastNu);return;} // NU dormant
 // Mi déjà actif — rien à faire pour l'instant.
});

/* ---------- Super-nav des 3 verbes (Road/Roam dormants en v1) ---------- */
document.getElementById('superNav').addEventListener('click',e=>{
 const b=e.target.closest('.verbe');if(!b)return;
 const v=b.dataset.verbe;
 if(v==='roots'){window.scrollTo({top:0,behavior:'smooth'});return;} // déjà ici
 toast(TEXTES[langue].toastVerbe(VERBES[v]));
});

/* ---------- Menu de l'expérience (hamburger) ---------- */
const voile=document.getElementById('voile'),drawer=document.getElementById('drawer');
function ouvrirDrawer(){drawer.classList.add('visible');voile.classList.add('visible');majIcones();}
function fermerDrawer(){drawer.classList.remove('visible');voile.classList.remove('visible');}
document.getElementById('btnBurger').addEventListener('click',ouvrirDrawer);
document.getElementById('btnFermerDrawer').addEventListener('click',fermerDrawer);
voile.addEventListener('click',fermerDrawer);

/* ---------- Roots Radio (placeholder) ---------- */
document.getElementById('btnRadio').addEventListener('click',e=>{
 e.currentTarget.classList.toggle('actif');
});

/* ---------- Langue ---------- */
document.getElementById('btnLangue').addEventListener('click',()=>{
 langue=langue==='fr'?'en':'fr';appliquerLangue();
});

/* ---------- Init ---------- */
appliquerLangue();
window.addEventListener('DOMContentLoaded',majIcones);
window.addEventListener('load',majIcones);
</script>
</body>
</html>
